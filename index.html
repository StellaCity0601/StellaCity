<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Stella City</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --dusty-pink:#f2a7d3;
      --pale-pink:#ffd9ef;
      --text:#f8eefd;
      --soft-text:#d7bdd0;
      --glass:rgba(16,12,30,.72);
      --line:rgba(242,167,211,.22);
      --shadow:rgba(0,0,0,.35);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;
      font-family:"Zen Maru Gothic",sans-serif;
      color:var(--text);
      background:#090b16;
    }

    h1,h2,h3{
      font-family:"Kaisei Decol",serif;
      font-weight:700;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;

      background:
        linear-gradient(
          to bottom,
          rgba(8,8,20,.20),
          rgba(8,8,20,.78)
        ),
        url("background.png") center center / cover no-repeat;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      z-index:-1;

      background:
        linear-gradient(
          to right,
          rgba(242,167,211,.08),
          rgba(45,53,80,.18),
          rgba(242,167,211,.08)
        );

      pointer-events:none;
    }

    .container{
      width:min(1180px,92%);
      margin:0 auto;
    }

    section{
      padding:100px 0;
    }

    .section-heading{
      text-align:center;
      margin-bottom:40px;
    }

    .decor{
      color:#ffb4de;
      font-size:13px;
      font-weight:700;
      letter-spacing:.26em;
      margin-bottom:12px;
    }

    .section-heading h2{
      font-size:clamp(32px,4vw,54px);
      color:#fff;
      letter-spacing:.08em;
      margin-bottom:10px;
    }

    .section-heading p{
      color:var(--soft-text);
      font-size:15px;
      font-weight:500;
    }

    /* =========================
       LINKS
    ========================= */

    .link-grid{
      max-width:940px;
      margin:0 auto;

      display:grid;
      grid-template-columns:repeat(3,1fr);

      gap:18px;
    }

    .link-card{
      min-height:300px;

      padding:24px 20px;

      border-radius:28px;

      background:var(--glass);

      backdrop-filter:blur(18px);

      border:1px solid var(--line);

      box-shadow:
        0 10px 40px var(--shadow);

      text-decoration:none;

      color:var(--text);

      transition:.22s ease;

      position:relative;
      overflow:hidden;
    }

    .link-card::before{
      content:"";
      position:absolute;
      inset:0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.06),
          transparent 38%
        );

      pointer-events:none;
    }

    .link-card:hover{
      transform:translateY(-4px);
    }

    /* メイン画像 */

    .link-icon{
      width:auto;
      height:auto;

      display:flex;
      align-items:center;
      justify-content:center;

      margin:0 auto 16px;

      background:none;
      border:none;
      border-radius:0;
      box-shadow:none;
    }

    .link-icon img{
      width:110px;
      height:110px;

      object-fit:contain;
      display:block;
    }

    /* Shop画像だけ少し大きく */

    .shop-card .link-icon img{
      width:120px;
      height:120px;
    }

    /* タイトル */

    .link-card h3{
      font-size:28px;

      line-height:1.25;

      margin-bottom:14px;

      color:#fff;

      font-weight:500;

      text-align:center;
    }

    /* Xだけ小さく */

    .link-card:last-child h3{
      font-size:24px;
      line-height:1.4;
    }

    /* 説明文 */

    .link-card p{
      color:var(--soft-text);

      font-weight:500;

      line-height:1.8;

      font-size:13px;

      text-align:center;
    }

    /* =========================
       SHOP BUTTONS
    ========================= */

    .shop-card{
      cursor:default;
    }

    .shop-link-buttons{
      display:flex;
      flex-direction:column;

      gap:10px;

      margin-top:18px;
    }

    .shop-link-buttons a{
      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:11px 13px;

      border-radius:14px;

      text-decoration:none;

      color:#ffd9ef;

      font-size:12px;
      font-weight:700;

      background:rgba(255,255,255,.04);

      border:1px solid rgba(242,167,211,.24);

      transition:.22s ease;
    }

    .shop-link-buttons a:hover{
      background:rgba(242,167,211,.10);
      transform:translateX(4px);
    }

    .shop-link-left{
      display:flex;
      align-items:center;
      gap:10px;
    }

    /* 内容はこちら画像 */

    .shop-mini-icon{
      width:42px;
      height:42px;

      display:flex;
      align-items:center;
      justify-content:center;

      flex-shrink:0;
    }

    .shop-mini-icon img{
      width:100%;
      height:100%;

      object-fit:contain;

      display:block;
    }

    /* 矢印 */

    .shop-arrow{
      color:#ffb6df;
      font-size:17px;
      font-weight:700;
    }

    /* =========================
       利用規約
    ========================= */

    .terms-small-link{
      margin-top:26px;
      text-align:center;
    }

    .terms-small-link a{
      display:inline-flex;
      align-items:center;
      gap:10px;

      color:#ffd9ef;

      text-decoration:none;

      font-size:13px;
      font-weight:700;

      transition:.2s ease;
    }

    .terms-small-link a:hover{
      opacity:.8;
    }

    .terms-small-link img{
      width:42px;
      height:42px;

      object-fit:contain;

      display:block;
    }

    footer{
      padding:36px 0 50px;

      text-align:center;

      color:var(--soft-text);

      font-size:14px;
      font-weight:500;
    }

    .footer-deco{
      margin-top:12px;

      color:#ffb4de;

      letter-spacing:.2em;
    }

    @media(max-width:980px){

      .link-grid{
        grid-template-columns:1fr;
      }

      .link-card{
        min-height:auto;
      }
    }

  </style>
</head>

<body>

  <section id="links">

    <div class="container">

      <div class="section-heading">

        <div class="decor">
          ✦ OFFICIAL LINKS ✦
        </div>

        <h2>リンク集</h2>

        <p>
          Discord、ショップ、Xはこちらから。
        </p>

      </div>

      <div class="link-grid">

        <!-- Discord -->

        <a class="link-card"
           href="https://discord.gg/ここに招待URL"
           target="_blank">

          <div class="link-icon">
            <img src="images/discord.png" alt="Discord">
          </div>

          <h3>Discord</h3>

          <p>
            参加案内、告知、チケット、
            サポートはこちら。
          </p>

        </a>

        <!-- Shop -->

        <div class="link-card shop-card">

          <div class="link-icon">
            <img src="images/shop.png" alt="Shop">
          </div>

          <h3>Shop</h3>

          <div class="shop-link-buttons">

            <a href="https://star-city.tebex.io/"
               target="_blank">

              <div class="shop-link-left">

                <div class="shop-mini-icon">
                  <img src="images/tebex.png" alt="Tebex">
                </div>

                テベックスはこちら

              </div>

              <div class="shop-arrow">
                ＞
              </div>

            </a>

            <a href="rules/naiyou.html">

              <div class="shop-link-left">

                <div class="shop-mini-icon">
                  <img src="images/content.png" alt="内容">
                </div>

                内容はこちら

              </div>

              <div class="shop-arrow">
                ＞
              </div>

            </a>

          </div>

        </div>

        <!-- X -->

        <a class="link-card"
           href="https://x.com/ここにID"
           target="_blank">

          <div class="link-icon">
            <img src="images/x.png" alt="X">
          </div>

          <h3>X / Twitter</h3>

          <p>
            最新情報や
            お知らせはこちら。
          </p>

        </a>

      </div>

      <!-- 利用規約 -->

      <div class="terms-small-link">

        <a href="rules/terms.html">

          <img src="images/content.png" alt="利用規約">

          利用規約はこちら ＞

        </a>

      </div>

    </div>

  </section>

  <footer>

    © 2026 Stella City. All rights reserved.

    <div class="footer-deco">
      ✦ ───── ♡ ───── ✦
    </div>

  </footer>

</body>
</html>
