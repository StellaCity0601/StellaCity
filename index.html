<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Stella City</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">

  <style>

    :root{
      --pink:#f2a7d3;
      --pink-deep:#d986b7;
      --text:#fff4fc;
      --soft:#dbc7d7;

      --glass:rgba(18,15,36,.72);
      --line:rgba(242,167,211,.24);

      --shadow:rgba(0,0,0,.38);
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      min-height:100vh;
      overflow-x:hidden;

      font-family:"Zen Maru Gothic",sans-serif;
      color:var(--text);

      background:#070914;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      z-index:-2;

      background:
        linear-gradient(
          to bottom,
          rgba(8,8,20,.18),
          rgba(8,8,20,.75)
        ),

        url("background.png") center center / cover no-repeat;
    }

    .container{
      width:min(1180px,92%);
      margin:auto;
    }

    section{
      padding:110px 0;
    }

    .section-heading{
      text-align:center;
      margin-bottom:54px;
    }

    .decor{
      color:#ffb8df;
      letter-spacing:.3em;
      font-size:12px;
      font-weight:700;
      margin-bottom:10px;
    }

    .section-heading h2{
      font-size:clamp(48px,6vw,86px);
      font-family:"Kaisei Decol",serif;
      color:#ffd8ef;
      margin-bottom:14px;
    }

    .section-heading p{
      color:#f5d7ea;
      font-size:18px;
    }

    .link-grid{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:26px;
    }

    .link-card{
      min-height:420px;

      padding:36px 30px;

      border-radius:38px;

      background:var(--glass);

      backdrop-filter:blur(18px);

      border:1px solid var(--line);

      box-shadow:
        0 10px 40px var(--shadow);

      position:relative;
      overflow:hidden;

      text-decoration:none;
      color:var(--text);

      transition:.25s ease;
    }

    .link-card:hover{
      transform:translateY(-6px);
    }

    .link-card::before{
      content:"";
      position:absolute;
      inset:0;

      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.08),
          transparent 38%
        );

      pointer-events:none;
    }

    .link-icon{
      width:92px;
      height:92px;

      margin:0 auto 28px;

      border-radius:50%;

      display:flex;
      align-items:center;
      justify-content:center;

      background:
        linear-gradient(
          135deg,
          #ffc6e7,
          #d986b7
        );

      box-shadow:
        0 0 28px rgba(242,167,211,.28);

      overflow:hidden;
    }

    .link-icon img{
      width:62px;
      height:62px;
      object-fit:contain;
      display:block;
    }

    .link-card h3{
      text-align:center;

      font-size:64px;

      line-height:1.1;

      margin-bottom:22px;

      color:#fff;

      font-family:"Kaisei Decol",serif;
      font-weight:700;
    }

    .link-card p{
      text-align:center;

      line-height:1.9;

      font-size:16px;

      color:var(--soft);

      font-weight:500;
    }

    .shop-card{
      cursor:default;
    }

    .shop-link-buttons{
      display:flex;
      flex-direction:column;

      gap:16px;

      margin-top:34px;
    }

    .shop-link-buttons a{
      display:flex;
      align-items:center;
      justify-content:space-between;

      padding:16px 18px;

      border-radius:18px;

      text-decoration:none;

      color:#ffe0f1;

      background:
        rgba(255,255,255,.04);

      border:1px solid rgba(242,167,211,.24);

      transition:.22s ease;
    }

    .shop-link-buttons a:hover{
      transform:translateX(4px);

      background:
        rgba(242,167,211,.12);
    }

    .shop-link-left{
      display:flex;
      align-items:center;
      gap:10px;

      font-size:15px;
      font-weight:700;
    }

    .shop-mini-icon{
      width:22px;
      height:22px;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    .shop-mini-icon img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .shop-arrow{
      color:#ffb6df;
      font-size:24px;
      font-weight:700;
    }

    .terms-small-link{
      margin-top:36px;
      text-align:right;
    }

    .terms-small-link a{
      display:inline-flex;
      align-items:center;
      gap:10px;

      color:#ffd9ef;

      text-decoration:none;

      font-size:14px;
      font-weight:700;

      transition:.2s ease;
    }

    .terms-small-link a:hover{
      opacity:.8;
    }

    .terms-small-link img{
      width:28px;
      height:28px;
      object-fit:contain;
    }

    @media(max-width:980px){

      .link-grid{
        grid-template-columns:1fr;
      }

      .link-card{
        min-height:auto;
      }

      .link-card h3{
        font-size:52px;
      }
    }

    @media(max-width:768px){

      .section-heading h2{
        font-size:58px;
      }

      .link-card{
        padding:30px 24px;
      }

      .link-card h3{
        font-size:42px;
      }
    }

  </style>
</head>

<body>

  <section id="links">

    <div class="container">

      <div class="section-heading">
        <div class="decor">✦ OFFICIAL LINKS ✦</div>

        <h2>リンク集</h2>

        <p>
          Discord、ショップ、Xはこちらから。
        </p>
      </div>

      <div class="link-grid">

        <!-- Discord -->
        <a class="link-card"
           href="https://discord.gg/ここに招待URL"
           target="_blank">

          <div class="link-icon">
            <img src="images/discord.png" alt="Discord">
          </div>

          <h3>Discord</h3>

          <p>
            参加案内、告知、チケット、
            サポートはこちら。
          </p>

        </a>

        <!-- Shop -->
        <div class="link-card shop-card">

          <div class="link-icon">
            <img src="images/shop.png" alt="Shop">
          </div>

          <h3>Shop</h3>

          <div class="shop-link-buttons">

            <a href="https://star-city.tebex.io/"
               target="_blank">

              <div class="shop-link-left">

                <div class="shop-mini-icon">
                  <img src="images/tebex.png" alt="Tebex">
                </div>

                テベックスはこちら

              </div>

              <div class="shop-arrow">
                ＞
              </div>

            </a>

            <a href="rules/terms.html">

              <div class="shop-link-left">

                <div class="shop-mini-icon">
                  <img src="images/content.png" alt="内容">
                </div>

                内容はこちら

              </div>

              <div class="shop-arrow">
                ＞
              </div>

            </a>

          </div>

        </div>

        <!-- X -->
        <a class="link-card"
           href="https://x.com/ここにID"
           target="_blank">

          <div class="link-icon">
            <img src="images/x.png" alt="X">
          </div>

          <h3>X /<br>Twitter</h3>

          <p>
            最新情報や
            お知らせはこちら。
          </p>

        </a>

      </div>

      <div class="terms-small-link">

        <a href="rules/terms.html">

          <img src="images/content.png" alt="利用規約">

          利用規約はこちら ＞

        </a>

      </div>

    </div>

  </section>

</body>
</html>
